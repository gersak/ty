<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Replicant + Ty Web Components Example</title>

    <!-- Ty CSS and Components (CDN) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@gersak/ty/css/ty.css">
    <script src="https://cdn.jsdelivr.net/npm/@gersak/ty/dist/ty.js"></script>

    <!-- Tailwind CSS (CDN for demo) -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="ty-canvas">
    <div id="app">
        <!-- Replicant will render content here -->
        <div class="ty-elevated p-8 rounded-lg max-w-md mx-auto mt-8">
            <p class="ty-text">Loading Replicant application...</p>
        </div>
    </div>

    <!-- Load our ClojureScript app with DEFER -->
    <script defer src="js/main.js"></script>
</body>

</html>
